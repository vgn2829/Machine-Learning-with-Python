                                </p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {domains.map((domain) => (
                                    <div 
                                        key={domain.key}
                                        onClick={() => setCurrentSection(domain.key)}
                                        className="bg-white rounded-lg shadow-lg p-6 cursor-pointer transform hover:scale-105 transition duration-200"
                                    >
                                        <div className={`text-${domain.color}-600 text-4xl mb-4 text-center`}>
                                            <i className={domain.icon}></i>
                                        </div>
                                        <h3 className="text-xl font-semibold text-gray-800 mb-3 text-center">
                                            {domain.name}
                                        </h3>
                                        <p className="text-gray-600 text-center text-sm">
                                            {domain.description}
                                        </p>
                                        <div className="mt-4 text-center">
                                            <span className={`text-${domain.color}-600 text-sm font-medium`}>
                                                Learn More →
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Features Section */}
                    <section className="py-16 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">
                                    Why Choose Our Platform?
                                </h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="text-center">
                                    <div className="text-purple-600 text-4xl mb-4">
                                        <i className="fas fa-video"></i>
                                    </div>
                                    <h3 className="text-xl font-semibold text-gray-800 mb-3">
                                        Curated Video Content
                                    </h3>
                                    <p className="text-gray-600">
                                        Hand-picked YouTube tutorials and playlists for structured learning
                                    </p>
                                </div>
                                <div className="text-center">
                                    <div className="text-purple-600 text-4xl mb-4">
                                        <i className="fas fa-chart-line"></i>
                                    </div>
                                    <h3 className="text-xl font-semibold text-gray-800 mb-3">
                                        Progress Tracking
                                    </h3>
                                    <p className="text-gray-600">
                                        Monitor your learning journey with detailed progress analytics
                                    </p>
                                </div>
                                <div className="text-center">
                                    <div className="text-purple-600 text-4xl mb-4">
                                        <i className="fas fa-mobile-alt"></i>
                                    </div>
                                    <h3 className="text-xl font-semibold text-gray-800 mb-3">
                                        Mobile Responsive
                                    </h3>
                                    <p className="text-gray-600">
                                        Learn on any device with our fully responsive design
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        // Learning Section Component
        const LearningSection = ({ domain, videos, watchedVideos, onToggleWatched, onPlayVideo }) => {
            const domainTitles = {
                photoshop: 'Adobe Photoshop',
                illustrator: 'Adobe Illustrator',
                digitalPainting: 'Digital Painting',
                afterEffects: 'Adobe After Effects'
            };

            const domainDescriptions = {
                photoshop: 'Master the art of photo editing, digital compositing, and graphic design with Adobe Photoshop.',
                illustrator: 'Create stunning vector graphics, logos, and illustrations with Adobe Illustrator.',
                digitalPainting: 'Explore digital art techniques, brush work, and creative expression in digital painting.',
                afterEffects: 'Bring your designs to life with motion graphics, visual effects, and animation.'
            };

            const watchedCount = videos.filter(video => watchedVideos.includes(video.id)).length;
            const progressPercentage = (watchedCount / videos.length) * 100;

            return (
                <div className="py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                                {domainTitles[domain]}
                            </h1>
                            <p className="text-lg text-gray-600 mb-6">
                                {domainDescriptions[domain]}
                            </p>
                            
                            <div className="max-w-md mx-auto">
                                <div className="flex justify-between text-sm text-gray-600 mb-2">
                                    <span>Progress: {watchedCount}/{videos.length} videos</span>
                                    <span>{Math.round(progressPercentage)}%</span>
                                </div>
                                <ProgressBar percentage={progressPercentage} />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {videos.map((video) => (
                                <VideoCard
                                    key={video.id}
                                    video={video}
                                    domain={domain}
                                    isWatched={watchedVideos.includes(video.id)}
                                    onToggleWatched={onToggleWatched}
                                    onPlay={onPlayVideo}
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Dashboard Component
        const Dashboard = ({ user, watchedVideos }) => {
            const calculateDomainProgress = (domain) => {
                const domainVideos = videoData[domain];
                const watchedCount = domainVideos.filter(video => watchedVideos.includes(video.id)).length;
                return {
                    watched: watchedCount,
                    total: domainVideos.length,
                    percentage: (watchedCount / domainVideos.length) * 100
                };
            };

            const domains = ['photoshop', 'illustrator', 'digitalPainting', 'afterEffects'];
            const domainNames = {
                photoshop: 'Photoshop',
                illustrator: 'Illustrator',
                digitalPainting: 'Digital Painting',
                afterEffects: 'After Effects'
            };

            const overallProgress = domains.reduce((acc, domain) => {
                const progress = calculateDomainProgress(domain);
                return {
                    watched: acc.watched + progress.watched,
                    total: acc.total + progress.total
                };
            }, { watched: 0, total: 0 });

            const overallPercentage = (overallProgress.watched / overallProgress.total) * 100;

            return (
                <div className="py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                                Learning Dashboard
                            </h1>
                            <p className="text-lg text-gray-600">
                                Welcome back, {user.name}! Track your progress across all domains.
                            </p>
                        </div>

                        {/* Overall Progress */}
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                            <h2 className="text-2xl font-bold text-gray-800 mb-4">Overall Progress</h2>
                            <div className="flex justify-between text-sm text-gray-600 mb-2">
                                <span>Total Progress: {overallProgress.watched}/{overallProgress.total} videos</span>
                                <span>{Math.round(overallPercentage)}%</span>
                            </div>
                            <ProgressBar percentage={overallPercentage} />
                        </div>

                        {/* Domain Progress */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {domains.map((domain) => {
                                const progress = calculateDomainProgress(domain);
                                return (
                                    <div key={domain} className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="text-xl font-semibold text-gray-800 mb-4">
                                            {domainNames[domain]}
                                        </h3>
                                        <div className="flex justify-between text-sm text-gray-600 mb-2">
                                            <span>{progress.watched}/{progress.total} videos completed</span>
                                            <span>{Math.round(progress.percentage)}%</span>
                                        </div>
                                        <ProgressBar percentage={progress.percentage} />
                                        <div className="mt-4">
                                            {progress.percentage === 100 ? (
                                                <span className="text-green-600 text-sm font-medium">
                                                    <i className="fas fa-check-circle mr-1"></i>
                                                    Domain Completed!
                                                </span>
                                            ) : (
                                                <span className="text-gray-600 text-sm">
                                                    {progress.total - progress.watched} videos remaining
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Recent Activity */}
                        <div className="bg-white rounded-lg shadow-lg p-6 mt-8">
                            <h2 className="text-2xl font-bold text-gray-800 mb-4">Learning Stats</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                                <div>
                                    <div className="text-3xl font-bold text-purple-600 mb-2">
                                        {overallProgress.watched}
                                    </div>
                                    <div className="text-gray-600">Videos Watched</div>
                                </div>
                                <div>
                                    <div className="text-3xl font-bold text-blue-600 mb-2">
                                        {domains.filter(domain => calculateDomainProgress(domain).percentage === 100).length}
                                    </div>
                                    <div className="text-gray-600">Domains Completed</div>
                                </div>
                                <div>
                                    <div className="text-3xl font-bold text-green-600 mb-2">
                                        {Math.round(overallPercentage)}%
                                    </div>
                                    <div className="text-gray-600">Overall Progress</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Resources Component
        const ResourcesSection = () => {
            const domainNames = {
                photoshop: 'Photoshop',
                illustrator: 'Illustrator',
                digitalPainting: 'Digital Painting',
                afterEffects: 'After Effects'
            };

            return (
                <div className="py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                                Learning Resources
                            </h1>
                            <p className="text-lg text-gray-600">
                                Downloadable guides, templates, and external links to enhance your learning
                            </p>
                        </div>

                        <div className="space-y-12">
                            {Object.keys(resourcesData).map((domain) => (
                                <div key={domain} className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6">
                                        {domainNames[domain]} Resources
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {resourcesData[domain].map((resource, index) => (
                                            <div key={index} className="border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-200">
                                                <div className="flex items-center mb-2">
                                                    <div className="text-purple-600 mr-3">
                                                        {resource.type === 'PDF' && <i className="fas fa-file-pdf"></i>}
                                                        {resource.type === 'Link' && <i className="fas fa-external-link-alt"></i>}
                                                        {resource.type === 'ZIP' && <i className="fas fa-file-archive"></i>}
                                                    </div>
                                                    <span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">
                                                        {resource.type}
                                                    </span>
                                                </div>
                                                <h3 className="font-semibold text-gray-800 mb-2">
                                                    {resource.title}
                                                </h3>
                                                <button 
                                                    onClick={() => window.open(resource.url, '_blank')}
                                                    className="text-purple-600 hover:text-purple-700 text-sm font-medium"
                                                >
                                                    {resource.type === 'Link' ? 'Visit Link' : 'Download'} →
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Contact Component
        const ContactSection = () => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                subject: '',
                message: ''
            });

            const handleSubmit = () => {
                if (!formData.name || !formData.email || !formData.message) {
                    alert('Please fill in all required fields');
                    return;
                }

                // Mock form submission
                alert('Thank you for your message! We will get back to you soon.');
                setFormData({ name: '', email: '', subject: '', message: '' });
            };

            return (
                <div className="py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                                Contact Us
                            </h1>
                            <p className="text-lg text-gray-600">
                                Have questions? We'd love to hear from you. Send us a message!
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            {/* Contact Form */}
                            <div className="bg-white rounded-lg shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Send us a Message</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Name *
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="Your name"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Email *
                                        </label>
                                        <input
                                            type="email"
                                            value={formData.email}
                                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="your.email@example.com"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Subject
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.subject}
                                            onChange={(e) => setFormData({...formData, subject: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="What is this about?"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Message *
                                        </label>
                                        <textarea
                                            value={formData.message}
                                            onChange={(e) => setFormData({...formData, message: e.target.value})}
                                            rows="5"
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="Your message..."
                                        ></textarea>
                                    </div>
                                    <button
                                        onClick={handleSubmit}
                                        className="w-full bg-purple-600 text-white py-3 rounded-md hover:bg-purple-700 transition duration-200"
                                    >
                                        Send Message
                                    </button>
                                </div>
                            </div>

                            {/* Contact Info */}
                            <div className="space-y-8">
                                <div className="bg-white rounded-lg shadow-lg p-8">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Get in Touch</h2>
                                    <div className="space-y-4">
                                        <div className="flex items-center">
                                            <div className="text-purple-600 mr-4">
                                                <i className="fas fa-map-marker-alt text-xl"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold text-gray-800">Address</h3>
                                                <p className="text-gray-600">IIT Kanpur, Uttar Pradesh, India</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center">
                                            <div className="text-purple-600 mr-4">
                                                <i className="fas fa-envelope text-xl"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold text-gray-800">Email</h3>
                                                <p className="text-gray-600">designclub@iitk.ac.in</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center">
                                            <div className="text-purple-600 mr-4">
                                                <i className="fas fa-users text-xl"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold text-gray-800">Club Hours</h3>
                                                <p className="text-gray-600">Mon-Fri: 6:00 PM - 9:00 PM</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg shadow-lg p-8">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Follow Us</h2>
                                    <div className="flex space-x-4">
                                        <a href="#" className="text-purple-600 hover:text-purple-700 text-2xl">
                                            <i className="fab fa-facebook"></i>
                                        </a>
                                        <a href="#" className="text-purple-600 hover:text-purple-700 text-2xl">
                                            <i className="fab fa-instagram"></i>
                                        </a>
                                        <a href="#" className="text-purple-600 hover:text-purple-700 text-2xl">
                                            <i className="fab fa-youtube"></i>
                                        </a>
                                        <a href="#" className="text-purple-600 hover:text-purple-700 text-2xl">
                                            <i className="fab fa-linkedin"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Search Results Component
        const SearchResults = ({ searchTerm, searchResults, onToggleWatched, onPlayVideo, watchedVideos }) => {
            return (
                <div className="py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">
                                Search Results
                            </h1>
                            <p className="text-lg text-gray-600">
                                Found {searchResults.length} results for "{searchTerm}"
                            </p>
                        </div>

                        {searchResults.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {searchResults.map((result) => (
                                    <VideoCard
                                        key={`${result.domain}-${result.video.id}`}
                                        video={result.video}
                                        domain={result.domain}
                                        isWatched={watchedVideos.includes(result.video.id)}
                                        onToggleWatched={onToggleWatched}
                                        onPlay={onPlayVideo}
                                    />
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-12">
                                <i className="fas fa-search text-6xl text-gray-300 mb-4"></i>
                                <h3 className="text-xl text-gray-600 mb-2">No results found</h3>
                                <p className="text-gray-500">Try searching with different keywords</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentSection, setCurrentSection] = useState('home');
            const [user, setUser] = useState(Storage.getUser());
            const [watchedVideos, setWatchedVideos] = useState(Storage.getWatchedVideos());
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [currentVideo, setCurrentVideo] = useState(null);
            const [isVideoPlayerOpen, setIsVideoPlayerOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);

            const handleLogin = (userData) => {
                setUser(userData);
                Storage.setUser(userData);
                setIsLoginModalOpen(false);
            };

            const handleLogout = () => {
                setUser(null);
                Storage.removeUser();
                setCurrentSection('home');
            };

            const handleToggleWatched = (videoId, domain) => {
                if (!user) {
                    setIsLoginModalOpen(true);
                    return;
                }

                const newWatchedVideos = watchedVideos.includes(videoId)
                    ? watchedVideos.filter(id => id !== videoId)
                    : [...watchedVideos, videoId];
                
                setWatchedVideos(newWatchedVideos);
                Storage.setWatchedVideos(newWatchedVideos);
            };

            const handlePlayVideo = (video) => {
                setCurrentVideo(video);
                setIsVideoPlayerOpen(true);
            };

            const handleSearch = () => {
                if (!searchTerm.trim()) return;

                const results = [];
                Object.keys(videoData).forEach(domain => {
                    videoData[domain].forEach(video => {
                        if (video.title.toLowerCase().includes(searchTerm.toLowerCase())) {
                            results.push({ domain, video });
                        }
                    });
                });

                setSearchResults(results);
                setCurrentSection('search');
            };

            const renderContent = () => {
                switch (currentSection) {
                    case 'home':
                        return <HomePage setCurrentSection={setCurrentSection} />;
                    case 'photoshop':
                    case 'illustrator':
                    case 'digitalPainting':
                    case 'afterEffects':
                        return (
                            <LearningSection 
                                domain={currentSection}
                                videos={videoData[currentSection]}
                                watchedVideos={watchedVideos}
                                onToggleWatched={handleToggleWatched}
                                onPlayVideo={handlePlayVideo}
                            />
                        );
                    case 'dashboard':
                        return user ? (
                            <Dashboard user={user} watchedVideos={watchedVideos} />
                        ) : (
                            <div className="text-center py-12">
                                <p className="text-lg text-gray-600 mb-4">Please login to view your dashboard</p>
                                <button 
                                    onClick={() => setIsLoginModalOpen(true)}
                                    className="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700"
                                >
                                    Login
                                </button>
                            </div>
                        );
                    case 'resources':
                        return <ResourcesSection />;
                    case 'contact':
                        return <ContactSection />;
                    case 'search':
                        return (
                            <SearchResults 
                                searchTerm={searchTerm}
                                searchResults={searchResults}
                                onToggleWatched={handleToggleWatched}
                                onPlayVideo={handlePlayVideo}
                                watchedVideos={watchedVideos}
                            />
                        );
                    default:
                        return <HomePage setCurrentSection={setCurrentSection} />;
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Navigation 
                        currentSection={currentSection}
                        setCurrentSection={setCurrentSection}
                        user={user}
                        onLogin={() => setIsLoginModalOpen(true)}
                        onLogout={handleLogout}
                    />

                    {currentSection !== 'home' && currentSection !== 'search' && (
                        <div className="bg-white shadow-sm py-4">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <SearchBar 
                                    searchTerm={searchTerm}
                                    setSearchTerm={setSearchTerm}
                                    onSearch={handleSearch}
                                />
                            </div>
                        </div>
                    )}

                    {renderContent()}

                    <LoginModal 
                        isOpen={isLoginModalOpen}
                        onClose={() => setIsLoginModalOpen(false)}
                        onLogin={handleLogin}
                    />

                    <VideoPlayer 
                        video={currentVideo}
                        isOpen={isVideoPlayerOpen}
                        onClose={() => setIsVideoPlayerOpen(false)}
                    />

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-8">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <p className="text-gray-300">
                                © 2024 IIT Kanpur Design and Animation Club. All rights reserved.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
